<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books Admin | Valerio Valente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #0a0a0a;
      color: #e5e5e5;
    }

    ::selection {
      background: #f97316;
      color: #0a0a0a;
    }
  </style>
</head>
<body class="min-h-screen">
  <main class="container mx-auto px-6 py-12 max-w-4xl">
    <h1 class="text-3xl font-bold mb-3 text-white">Books Admin</h1>
    <p class="text-gray-300 mb-6">
      Add a new book to files/books.json and publish it via GitHub API. Your token is only used in this browser session and is never stored.
    </p>

    <div class="rounded-lg border border-zinc-800 bg-zinc-900 p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">Repository Settings</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <label class="block">
          <span class="text-sm text-gray-300">GitHub Owner</span>
          <input id="owner" type="text" value="valeriova96" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white">
        </label>
        <label class="block">
          <span class="text-sm text-gray-300">Repository</span>
          <input id="repo" type="text" value="valeriova96.github.io" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white">
        </label>
        <label class="block">
          <span class="text-sm text-gray-300">Branch</span>
          <input id="branch" type="text" value="master" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white">
        </label>
        <label class="block">
          <span class="text-sm text-gray-300">Data File Path</span>
          <input id="filePath" type="text" value="files/books.json" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white">
        </label>
      </div>
      <label class="block mt-4">
        <span class="text-sm text-gray-300">GitHub Token (Contents: Write)</span>
        <input id="token" type="password" autocomplete="off" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white" placeholder="github_pat_...">
      </label>
    </div>

    <div class="rounded-lg border border-zinc-800 bg-zinc-900 p-6 mb-8">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Books List</h2>
        <button id="loadBooksBtn" type="button" class="rounded bg-zinc-800 hover:bg-zinc-700 px-3 py-1 text-sm font-semibold text-white">
          Load Books
        </button>
      </div>
      <div id="books-list" class="space-y-3 max-h-96 overflow-y-auto">
        <p class="text-gray-400 text-sm">Click "Load Books" to fetch and display all books</p>
      </div>
    </div>

    <form id="book-form" class="rounded-lg border border-zinc-800 bg-zinc-900 p-6 space-y-4">
      <h2 id="form-title" class="text-xl font-semibold mb-2">New Book</h2>

      <label class="block">
        <span class="text-sm text-gray-300">Title</span>
        <input id="title" required type="text" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white">
      </label>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <label class="block">
          <span class="text-sm text-gray-300">Author</span>
          <input id="author" required type="text" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white">
        </label>
        <label class="block">
          <span class="text-sm text-gray-300">Publisher</span>
          <input id="publisher" required type="text" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white">
        </label>
        <label class="block">
          <span class="text-sm text-gray-300">Year</span>
          <input id="year" required type="text" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white" placeholder="2026">
        </label>
      </div>

      <label class="block">
        <span class="text-sm text-gray-300">Image Path</span>
        <input id="image" required type="text" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white" placeholder="images/new_book.jpg">
      </label>

      <label class="block">
        <span class="text-sm text-gray-300">Image Alt (optional)</span>
        <input id="imageAlt" type="text" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white">
      </label>

      <label class="block">
        <span class="text-sm text-gray-300">Preview</span>
        <textarea id="preview" required rows="3" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white"></textarea>
      </label>

      <label class="block">
        <span class="text-sm text-gray-300">Full Review</span>
        <textarea id="fullReview" required rows="6" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white"></textarea>
      </label>

      <label class="block">
        <span class="text-sm text-gray-300">Amazon URL</span>
        <input id="amazonUrl" required type="url" class="mt-1 w-full rounded bg-zinc-950 border border-zinc-700 p-2 text-white" placeholder="https://...">
      </label>

      <div class="flex items-center gap-3 pt-2">
        <button id="submitBtn" type="submit" class="rounded bg-orange-600 hover:bg-orange-500 px-4 py-2 font-semibold text-white">
          Add Book And Commit
        </button>
        <button id="cancelBtn" type="button" class="rounded border border-zinc-700 hover:bg-zinc-800 px-4 py-2 font-semibold text-white hidden">
          Cancel Edit
        </button>
        <button id="resetBtn" type="button" class="rounded border border-zinc-700 hover:bg-zinc-800 px-4 py-2 font-semibold text-white">
          Reset
        </button>
      </div>
    </form>

    <div id="status" class="mt-6 text-sm text-gray-300"></div>
  </main>

  <script>
    const form = document.getElementById('book-form');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const resetBtn = document.getElementById('resetBtn');
    const loadBooksBtn = document.getElementById('loadBooksBtn');
    const booksList = document.getElementById('books-list');
    const formTitle = document.getElementById('form-title');

    // State management
    let currentBooks = [];
    let currentFileData = null;
    let editingIndex = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? 'mt-6 text-sm text-red-400' : 'mt-6 text-sm text-green-400';
    }

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function encodeBase64Utf8(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = '';
      for (let i = 0; i < bytes.length; i += 1) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function decodeBase64Utf8(base64Text) {
      const binary = atob(base64Text.replace(/\n/g, ''));
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    async function getBooksFile(owner, repo, path, branch, token) {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${encodeURIComponent(branch)}`;
      const response = await fetch(url, {
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github+json'
        }
      });

      if (!response.ok) {
        const errorBody = await response.text();
        throw new Error(`GitHub read failed (${response.status}). Check browser console for details.`);
      }

      return response.json();
    }

    async function updateBooksFile(owner, repo, path, branch, token, sha, books, commitMessage) {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const payload = {
        message: commitMessage,
        branch,
        sha,
        content: encodeBase64Utf8(`${JSON.stringify(books, null, 2)}\n`)
      };

      const response = await fetch(url, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const body = await response.text();
        throw new Error(`GitHub write failed (${response.status}): ${body}`);
      }

      return response.json();
    }

    function renderBooksList() {
      booksList.innerHTML = currentBooks.map((book, index) => `
        <div class="rounded border border-zinc-700 bg-zinc-800 p-3 flex justify-between items-start gap-3">
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-white truncate">${book.title}</p>
            <p class="text-sm text-gray-400">${book.author} (${book.year})</p>
          </div>
          <div class="flex gap-2 flex-shrink-0">
            <button type="button" class="rounded bg-blue-600 hover:bg-blue-500 px-2 py-1 text-xs font-semibold text-white edit-btn" data-index="${index}">
              Edit
            </button>
            <button type="button" class="rounded bg-red-600 hover:bg-red-500 px-2 py-1 text-xs font-semibold text-white delete-btn" data-index="${index}">
              Delete
            </button>
          </div>
        </div>
      `).join('');

      // Attach event listeners to buttons
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', handleEditBook);
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', handleDeleteBook);
      });
    }

    async function loadBooks() {
      setStatus('Loading books...');
      loadBooksBtn.disabled = true;

      try {
        const owner = getValue('owner');
        const repo = getValue('repo');
        const branch = getValue('branch');
        const filePath = getValue('filePath');
        const token = getValue('token');

        if (!owner || !repo || !branch || !filePath || !token) {
          throw new Error('Repository settings and token are required.');
        }

        currentFileData = await getBooksFile(owner, repo, filePath, branch, token);
        const rawContent = decodeBase64Utf8(currentFileData.content || 'W10=');
        currentBooks = JSON.parse(rawContent);

        if (!Array.isArray(currentBooks)) {
          throw new Error('books.json is not an array.');
        }

        renderBooksList();
        setStatus(`Loaded ${currentBooks.length} book(s).`);
      } catch (error) {
        setStatus(error.message, true);
        currentBooks = [];
        renderBooksList();
      } finally {
        loadBooksBtn.disabled = false;
      }
    }

    function handleEditBook(event) {
      const index = parseInt(event.target.dataset.index);
      const book = currentBooks[index];

      editingIndex = index;
      document.getElementById('title').value = book.title;
      document.getElementById('author').value = book.author;
      document.getElementById('publisher').value = book.publisher;
      document.getElementById('year').value = book.year;
      document.getElementById('image').value = book.image;
      document.getElementById('imageAlt').value = book.imageAlt || '';
      document.getElementById('preview').value = book.preview;
      document.getElementById('fullReview').value = book.fullReview;
      document.getElementById('amazonUrl').value = book.amazonUrl;

      formTitle.textContent = `Edit Book: ${book.title}`;
      submitBtn.textContent = 'Update Book And Commit';
      submitBtn.classList.remove('bg-orange-600', 'hover:bg-orange-500');
      submitBtn.classList.add('bg-blue-600', 'hover:bg-blue-500');
      cancelBtn.classList.remove('hidden');
      resetBtn.classList.add('hidden');

      form.scrollIntoView({ behavior: 'smooth' });
      setStatus('');
    }

    function handleDeleteBook(event) {
      const index = parseInt(event.target.dataset.index);
      const book = currentBooks[index];

      if (confirm(`Are you sure you want to delete "${book.title}"?`)) {
        deleteBook(index);
      }
    }

    async function deleteBook(index) {
      setStatus('Deleting book...');
      submitBtn.disabled = true;

      try {
        const owner = getValue('owner');
        const repo = getValue('repo');
        const branch = getValue('branch');
        const filePath = getValue('filePath');
        const token = getValue('token');

        const bookTitle = currentBooks[index].title;
        currentBooks.splice(index, 1);

        const commitMessage = `Delete book: ${bookTitle}`;
        await updateBooksFile(owner, repo, filePath, branch, token, currentFileData.sha, currentBooks, commitMessage);

        setStatus(`Success. "${bookTitle}" was deleted from ${owner}/${repo}.`);
        renderBooksList();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        submitBtn.disabled = false;
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      
      if (editingIndex !== null) {
        setStatus('Updating book...');
      } else {
        setStatus('Publishing new book...');
      }
      submitBtn.disabled = true;

      try {
        const owner = getValue('owner');
        const repo = getValue('repo');
        const branch = getValue('branch');
        const filePath = getValue('filePath');
        const token = getValue('token');

        if (!owner || !repo || !branch || !filePath || !token) {
          throw new Error('Repository settings and token are required.');
        }

        const bookData = {
          title: getValue('title'),
          author: getValue('author'),
          publisher: getValue('publisher'),
          year: getValue('year'),
          image: getValue('image'),
          imageAlt: getValue('imageAlt') || getValue('title'),
          preview: getValue('preview'),
          fullReview: getValue('fullReview'),
          amazonUrl: getValue('amazonUrl')
        };

        let commitMessage;
        if (editingIndex !== null) {
          // Update existing book
          currentBooks[editingIndex] = bookData;
          commitMessage = `Update book: ${bookData.title}`;
        } else {
          // Add new book
          currentBooks.push(bookData);
          commitMessage = `Add book: ${bookData.title}`;
        }

        await updateBooksFile(owner, repo, filePath, branch, token, currentFileData.sha, currentBooks, commitMessage);

        if (editingIndex !== null) {
          setStatus(`Success. "${bookData.title}" was updated in ${owner}/${repo}.`);
        } else {
          setStatus(`Success. "${bookData.title}" was committed to ${owner}/${repo}.`);
        }

        form.reset();
        resetEditMode();
        renderBooksList();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        submitBtn.disabled = false;
      }
    });

    function resetEditMode() {
      editingIndex = null;
      formTitle.textContent = 'New Book';
      submitBtn.textContent = 'Add Book And Commit';
      submitBtn.classList.remove('bg-blue-600', 'hover:bg-blue-500');
      submitBtn.classList.add('bg-orange-600', 'hover:bg-orange-500');
      cancelBtn.classList.add('hidden');
      resetBtn.classList.remove('hidden');
    }

    cancelBtn.addEventListener('click', () => {
      form.reset();
      resetEditMode();
      setStatus('Edit cancelled.');
    });

    resetBtn.addEventListener('click', () => {
      form.reset();
      setStatus('Form cleared.');
    });

    loadBooksBtn.addEventListener('click', loadBooks);
  </script>
</body>
</html>
